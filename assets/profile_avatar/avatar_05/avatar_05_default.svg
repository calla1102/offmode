<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .blue  { fill:none; stroke:#35E6FF; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; filter:url(#glowBlue); }
      .yellow{ fill:none; stroke:#FFC93A; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; filter:url(#glowYellow); }
      .pink  { fill:none; stroke:#FF3BCB; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; filter:url(#glowPink); }
      .plain { fill:none; stroke:#35E6FF; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>
  <rect width="256" height="256" rx="28" fill="#0B0F2A"/>

  <!-- hair: twin tails (양 갈래) -->
  <!-- crown / top -->
  <path class="blue" d="M84 84 C84 56,100 42,128 42 C156 42,172 56,172 84"/>

  <!-- left twintail – starts at left temple, sweeps out and down -->
  <path class="blue" d="M80 88 C68 96,56 108,52 128 C48 148,54 170,62 188 C66 196,72 200,78 198"/>
  <path class="blue" d="M80 88 C72 98,64 114,62 134 C60 154,64 172,70 186"/>

  <!-- right twintail – mirrors left -->
  <path class="blue" d="M176 88 C188 96,200 108,204 128 C208 148,202 170,194 188 C190 196,184 200,178 198"/>
  <path class="blue" d="M176 88 C184 98,192 114,194 134 C196 154,192 172,186 186"/>

  <!-- hair ties / ribbons at the sides -->
  <path class="pink" d="M74 102 C68 98,68 106,74 104"/>
  <path class="pink" d="M182 102 C188 98,188 106,182 104"/>

  <!-- soft bangs -->
  <path class="blue" d="M88 78 C100 70,116 66,128 68 C140 66,156 70,168 78"/>

  <!-- ears -->
  <path class="plain" d="M71 112 C60 114,60 132,71 136"/>
  <path class="plain" d="M185 112 C196 114,196 132,185 136"/>

  <!-- face -->
  <path class="plain" d="M78 84 L78 172 C78 206,101 224,128 224 C155 224,178 206,178 172 L178 84"/>

  <!-- eyebrows -->
  <path class="yellow" d="M96 96 L113 92"/>
  <path class="yellow" d="M143 92 L160 96"/>

  <!-- eyes -->
  <circle class="plain" cx="104" cy="116" r="10"/>
  <circle class="plain" cx="152" cy="116" r="10"/>
  <circle class="plain" cx="104" cy="116" r="2"/>
  <circle class="plain" cx="152" cy="116" r="2"/>

  <!-- lashes left -->
  <path class="plain" d="M96 108 L93 104"/>
  <path class="plain" d="M104 106 L104 102"/>
  <path class="plain" d="M112 108 L115 104"/>

  <!-- lashes right -->
  <path class="plain" d="M144 108 L141 104"/>
  <path class="plain" d="M152 106 L152 102"/>
  <path class="plain" d="M160 108 L163 104"/>

  <!-- nose -->
  <path class="yellow" d="M128 128 L128 129"/>

  <!-- mouth -->
  <path class="pink" d="M108 153 C116 166,140 166,148 153"/>

  <!-- chin accent -->
  <path class="pink" d="M116 163 C122 169,134 169,140 163" opacity="0.9"/>
</svg>
