name: Fix Template
description: 버그 또는 잘못된 동작 수정 시 사용하는 이슈 템플릿
title: "[모듈명] "
labels: ["fix"]

body:
  - type: input
    id: problem
    attributes:
      label: "📝 무엇을 수정하나요?"
      description: "수정 대상 또는 문제를 간단히 적어주세요."
      placeholder: "ex. 게시글 조회 DTO 필드 누락 수정"
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: "📍 문제 상황"
      description: "현재 어떤 문제가 발생하는지 작성해주세요."
      placeholder: |
        ex.
        - 게시글 조회 시 작성자 이름이 누락됨
        - 특정 요청에서 500 에러 발생
    validations:
      required: true

  - type: textarea
    id: fix_details
    attributes:
      label: "🛠 수정 내용"
      description: "어떻게 수정할 예정인지 작성해주세요."
      placeholder: |
        ex.
        - DTO 필드 매핑 수정
        - null 처리 로직 추가
        - 테스트 코드 보완
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "👀 추가 설명"
      description: "관련 로그, 스크린샷, 참고사항 등을 작성해주세요."
      placeholder: "ex. 운영 환경에서만 재현됨"
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ 완료 조건"
      description: "어떤 상태가 되면 수정 완료인지 작성해주세요."
      placeholder: |
        ex.
        - [ ] 동일한 요청에서 오류가 발생하지 않는다
        - [ ] 관련 테스트가 통과한다
    validations:
      required: false