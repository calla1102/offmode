spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}   # 기본은 dev, 배포 시 prod로 변경
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    baseline-on-migrate: true

server:
  port: ${PORT:8080}   # Railway는 PORT 환경변수를 자동 주입

jwt:
  secret: ${JWT_SECRET:offmode-dev-secret-change-in-production-must-be-long-enough}
  expiration-days: 90

kakao:
  user-info-url: https://kapi.kakao.com/v2/user/me
  request-timeout-seconds: 5

apple:
  bundle-id: com.minnnj.offmode
  keys-url: https://appleid.apple.com/auth/keys
  issuer: https://appleid.apple.com
  request-timeout-seconds: 5

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

r2:
  access-key: ${R2_ACCESS_KEY:}
  secret-key: ${R2_SECRET_KEY:}
  endpoint: ${R2_ENDPOINT:}
  bucket: ${R2_BUCKET:}
  public-url: ${R2_PUBLIC_URL:}

logging:
  level:
    com.offmode: ${LOG_LEVEL:DEBUG}
